name: PANORIX Quality Checks

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m compileall -q app.py jobs tests scripts
      - run: ruff check app.py jobs tests scripts
      - run: pytest -q
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python scripts/extract_app_js.py /tmp/panorix_app.js
      - run: node --check /tmp/panorix_app.js
